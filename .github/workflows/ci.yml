name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────
  # Linux: Full validation (fmt + clippy + test)
  # ──────────────────────────────────────────────
  linux:
    name: Linux — Build, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build (debug)
        run: cargo build --workspace

      - name: Build (release)
        run: cargo build --workspace --release

      - name: Run tests
        run: cargo test --workspace -- --test-threads=1

  # ──────────────────────────────────────────────
  # Windows: Build verification
  # ──────────────────────────────────────────────
  windows:
    name: Windows — Build + Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build (debug)
        run: cargo build --workspace

      - name: Build (release)
        run: cargo build --workspace --release

      - name: Run tests
        run: cargo test --workspace -- --test-threads=1

  # ──────────────────────────────────────────────
  # UI: Lint, format, typecheck
  # ──────────────────────────────────────────────
  ui:
    name: UI — Lint + Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript typecheck
        run: npx tsc --noEmit

  # ──────────────────────────────────────────────
  # Code coverage (Linux only)
  # ──────────────────────────────────────────────
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run coverage
        run: cargo tarpaulin --workspace --out xml --output-dir coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ──────────────────────────────────────────────
  # Security audit
  # ──────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny || true

      - name: Audit dependencies
        run: cargo deny check licenses || echo "::warning::cargo-deny not configured yet"

  # ──────────────────────────────────────────────
  # Task tracker scan
  # ──────────────────────────────────────────────
  task-scan:
    name: Task Tracker Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scan for TODOs/FIXMEs
        run: node scripts/task-tracker.mjs --scan-only
